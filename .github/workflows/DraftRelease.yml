name: Draft Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  flatpak:
    uses: ./.github/workflows/FlatpakBuild.yml

  release:
    name: Draft release
    needs: [flatpak]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts
        run: |
          cd artifacts
          cp prey2006-flatpak-x86_64/prey2006.flatpak .

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/prey2006.flatpak
